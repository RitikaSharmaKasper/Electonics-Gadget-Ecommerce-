services:
  backend:
    build:
      context: ./server
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: ./client
      args:
        VITE_BASE_URL: https://api.happyartsupplies.in/api/v1
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend